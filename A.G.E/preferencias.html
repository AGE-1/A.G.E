<section id="preferencias">
  <h1>Preferencias</h1>

  <form>
    <div>
      <label for="idioma">Idioma</label>
      <select id="idioma" name="idioma">
        <option value="es" selected>Español</option>
        <option value="en">English</option>
      </select>
    </div>

    <div>
      <label for="moneda">Moneda</label>
      <select id="moneda" name="moneda">
        <option value="dop" selected>DOP (RD$)</option>
        <option value="usd">USD ($)</option>
      </select>
    </div>

    <div>
      <label for="tema">Tema</label>
      <select id="tema" name="tema">
        <option value="claro" selected>Claro</option>
        <option value="oscuro">Oscuro</option>
      </select>
    </div>

    <div>
      <label for="notificaciones">Notificaciones</label>
      <input type="checkbox" id="notificaciones" name="notificaciones" checked>
    </div>

    <div>
      <label for="inicio-automatico">Inicio automático</label>
      <input type="checkbox" id="inicio-automatico" name="inicio-automatico" checked>
    </div>

    <div>
      <label for="respaldo-automatico">Respaldo automático</label>
      <select id="respaldo-automatico" name="respaldo-automatico">
        <option value="diario" selected>Diario</option>
        <option value="semanal">Semanal</option>
        <option value="mensual">Mensual</option>
      </select>
    </div>

    <div>
      <label for="formato-fecha">Formato de fecha</label>
      <select id="formato-fecha" name="formato-fecha">
        <option value="dd-mm-aaaa" selected>DD/MM/AAAA</option>
        <option value="mm-dd-aaaa">MM/DD/AAAA</option>
      </select>
    </div>

    <div>
      <label for="animaciones">Animaciones</label>
      <input type="checkbox" id="animaciones" name="animaciones" checked>
    </div>

    <button type="submit">Guardar cambios</button>
  </form>
</section>
