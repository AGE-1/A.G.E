<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrarse</title>
</head>
<body>
    <div class="contenedor">   
        <main>
            <section class="registrarse">
                <h1>Registrarse</h1>
                <form>
                    <label for="nombre">Nombre:</label>
                    <input type="text" id="username" name="username" placeholder="Nombre" required>

                    <label for="apellido">Apellido:</label>
                    <input type="text" id="lastname" name="lastname" placeholder="Apellido" required>

                    <label for="email">Correo electrónico:</label>
                    <input type="email" id="email" name="email" placeholder="Correo electrónico" required>

                    <label for="contraseña">Contraseña:</label>
                    <input type="password" id="password" name="password" placeholder="Contraseña" required>

                    <label for="login">¿Ya tienes una cuenta?</label>
                    <a href="#">Inicia sesión</a>
                    <input type="button" value="Registrarse">
                    <a href="#">Regresar</a>
                </form>
                <div class="seccion-negra2"></div>
            </section>
        </main>
    </div>
</body>
</html>
