    <h1>Configuración</h1>
<div id="usuario">
  <h1>Usuario</h1>

  <form>
    <div>
      <label for="nombre-usuario">Nombre de usuario</label>
      <input type="text" id="nombre-usuario" name="nombre-usuario" value="jperez">
    </div>

    <div>
      <label for="correo">Correo electrónico</label>
      <input type="email" id="correo" name="correo" value="juan@empresa.com">
    </div>

    <div>
      <label for="telefono">Teléfono</label>
      <input type="tel" id="telefono" name="telefono" value="(809) 123-4567">
    </div>

    <div>
      <label for="contrasena-actual">Contraseña actual</label>
      <input type="password" id="contrasena-actual" name="contrasena-actual" value="********">
    </div>

    <div>
      <label for="fecha-creacion">Fecha de creación</label>
      <input type="text" id="fecha-creacion" name="fecha-creacion" value="15/02/2026" readonly>
    </div>

    <div>
      <label for="ultimo-inicio-sesion">Último inicio de sesión</label>
      <input type="text" id="ultimo-inicio-sesion" name="ultimo-inicio-sesion" value="02/07/2026 08:42" readonly>
    </div>

    <div>
      <label for="id-usuario">ID de usuario</label>
      <input type="text" id="id-usuario" name="id-usuario" value="USR-0001" readonly>
    </div>

    <button type="submit">Guardar</button>
  </form>
