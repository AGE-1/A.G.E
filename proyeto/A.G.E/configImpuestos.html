<div id="impuestos">
  <h1>Impuestos</h1>

  <form>
    <div>
      <label for="tipo-impuesto">Tipo de impuesto</label>
      <input type="text" id="tipo-impuesto" name="tipo-impuesto" value="ITBIS">
    </div>

    <div>
      <label for="tasa-impuesto">Tasa de impuesto</label>
      <input type="text" id="tasa-impuesto" name="tasa-impuesto" value="18%">
    </div>

    <div>
      <label for="impuesto-predeterminado">Impuesto predeterminado</label>
      <input type="text" id="impuesto-predeterminado" name="impuesto-predeterminado" value="ITBIS General">
    </div>

    <div>
      <label for="rnc">Número de identificación fiscal</label>
      <input type="text" id="rnc" name="identificación-fiscal" value="10914">
    </div>

    <div>
      <label for="comprobantes-fiscales">Comprobantes fiscales</label>
      <input type="text" id="comprobantes-fiscales" name="comprobantes-fiscales" value="Habilitados">
    </div>

    <button type="submit">Guardar cambios</button>
  </form>
