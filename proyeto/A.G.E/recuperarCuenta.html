<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Cuenta</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/script.js"></script>
    <link rel="icon" href="./image/Logo A.G.E.png">
</head>
<body>
    <div class="contenedor-principal2">
        <div class="login">
            <h1>Recuperar Cuenta</h1>
                <p>Ingresa tu usuario o correo electrónico asociado a tu cuenta. Te enviaremos un código de verificación a tu correo electrónico.</p>
                <label for="email">Usuario o Correo electrónico:</label>
                <input type="email" id="email" name="email" required>
                <p>Ingresa el código que recibiste por correo electrónico. No lo recibiste? <a href="#">Solicitar nuevamente</a></p>
                <label for="codigo">Ingresa el código:</label>
                <input type="text" id="codigo" name="codigo" required>
                <form action="login.html" class="botoniniciar">
                <button class="botonlog" href="login.html">Recuperar Cuenta</button>
                </form>
                <a href="login.html">Regresar</a>
            </div>
        <div class="seccion-negra2">
    </div>
</body>
</html>
