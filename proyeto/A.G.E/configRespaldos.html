<div id="respaldos">
  <h1>Respaldos</h1>

  <form>
    <div>
      <label for="copia-automatica">Copia automática</label>
      <input type="text" id="copia-automatica" name="copia-automatica" value="Activada">
    </div>

    <div>
      <label for="frecuencia-respaldo">Frecuencia de respaldo</label>
      <input type="text" id="frecuencia-respaldo" name="frecuencia-respaldo" value="Diario">
    </div>

    <div>
      <label for="ultimo-respaldo">Último respaldo</label>
      <input type="text" id="ultimo-respaldo" name="ultimo-respaldo" value="28/06/2026 - 12:00 PM">
    </div>

    <div>
      <label for="ubicacion">Ubicación</label>
      <input type="text" id="ubicacion" name="ubicacion" value="Servidor seguro">
    </div>

    <div>
      <label for="mantener-copias">Mantener copias</label>
      <input type="text" id="mantener-copias" name="mantener-copias" value="Últimos 30 días">
    </div>

    <div>
      <label for="restauracion">Restauración</label>
      <input type="text" id="restauracion" name="restauracion" value="Disponible">
    </div>

    <button type="submit">Guardar cambios</button>
  </form>
