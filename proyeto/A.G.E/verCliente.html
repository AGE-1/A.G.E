        <div class="infocliente">
            <img src="" alt="" id="imagen-Cliente">
            <form action="">
                <label for="NombreEmpleado">Nombre Cliente:</label>
                <input type="text" id="NombreEmpleado">
                
                <label for="tel">Numero Telefonico:</label>
                <input type="tel" id="tel">

                <input type="text" id="ubi">

                <label for="fecharegistro">Fecha de Registro:</label>
                <input type="date" id="fecharegistro">

                <textarea name="Descripcion" id="Descripcion-cliente" placeholder="Agregar Descripcion"></textarea>
