<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ver Empleado</title>
</head>
<body>
    <div class="contenedor-principal">
        <h1>Cliente</h1>
        <nav class="nav-VerEmpleado">
            <img src="" alt="">
            <ul>
                <li><a href="#">Dashboard</a></li>
                <li><a href="#">Notificaciones</a></li>
                <li><a href="#">Configuracion</a></li>
                <li><a href="#">Clientes</a></li>
                <li><a href="#">Facturacion</a></li>
                <li><a href="#">Empleados</a></li>
                <li><a href="#">Inventario</a></li>
                <li><a href="#">Produccion</a></li>
                <li><a href="#">Estadisticas</a></li>
                <li><a href="#">Personal</a></li>
            </ul>
        </nav>
        <div class="infoempleado">
            <img src="" alt="" id="imagen-empleado">
            <form action="">
                <label for="NombreEmpleado">Nombre Empleado:</label>
                <input type="text" id="NombreEmpleado">
                
                <label for="tel">Numero Telefonico:</label>
                <input type="tel" id="tel">

                <label for="mail">Correo Electronico:</label>
                <input type="email" id="mail">

                <label for="cdl">Identificacion:</label>
                <input type="number" id="cdl">

                <label for="area">Area:</label>
                <select name="Area" id="area">
                    <option value="">Opcion1</option>
                    <option value="">Opcion2</option>
                    <option value="">Opcion3</option>
                </select>

                <label for="horario">Horario:</label>
                <input type="time" id="horario">

                <label for="Nomina">Nomina:</label>
                <input type="number" id="Nomina">

                <textarea name="Descripcion" id="Descripcion-cliente" placeholder="Agregar Descripcion"></textarea>
            </form>

            <button>Eliminar</button>
            
        </div>
        <footer>Derechos reservados por A.G.E&#174;</footer>
    </div>
</body>
</html>
