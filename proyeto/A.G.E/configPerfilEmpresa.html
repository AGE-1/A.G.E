<section id="perfil-empresa">
  <h1>Perfil de la empresa</h1>

  <form>
    <div>
      <label for="nombre-empresa">Nombre de la empresa</label>
      <input type="text" id="nombre-empresa" name="nombre-empresa" value="Distribuidora Televendo">
    </div>

    <div>
      <label for="ruc">RUC / ID Fiscal</label>
      <input type="text" id="ruc" name="ruc" value="10914">
    </div>

    <div>
      <label for="telefono">Teléfono</label>
      <input type="tel" id="telefono" name="telefono" value="(809) 123-4567">
    </div>

    <div>
      <label for="correo">Correo electrónico</label>
      <input type="email" id="correo" name="correo" value="info@televendo.com">
    </div>

    <div>
      <label for="direccion">Dirección</label>
      <input type="text" id="direccion" name="direccion" value="Av. Principal #123, Santo Domingo, RD">
    </div>

    <button type="submit">Guardar cambios</button>
  </form>
</section>
